name: 1 Generate Scope

on:
  workflow_dispatch:
    inputs:
      smoke_limit:
        description: "Optional small-run limit for smoke testing"
        required: false
        default: ""
      chain_next:
        description: "Verify output and dispatch the next workflow"
        required: false
        default: "false"
#  push:
#    branches:
#      - master

permissions:
  contents: write
  actions: write

jobs:
  run-audit:
    runs-on: ubuntu-latest
    env:
      BOT_SMOKE_LIMIT: ${{ inputs.smoke_limit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
          pip install -r requirements.txt || echo "No requirements.txt found, skipping"

      - name: Run Split Scope
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: python run_split_all_scope_questions.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          git commit -m "Auto-update: collections and reports"
          # Retry logic
          n=0
          until [ $n -ge 3 ]; do
            git pull --rebase origin master
            if git push --force origin master; then
              echo "Push succeeded"
              break
            fi
            n=$((n+1))
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          
          # Fail the step if all retries are exhausted
          if [ $n -eq 3 ]; then
          echo "Failed to push after 3 attempts"
          exit 1
          fi

      - name: Verify and advance chain
        if: inputs.chain_next == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python workflow_chain.py advance --stage 1 --next-workflow 2_run_question_generator.yml --smoke-limit "${{ inputs.smoke_limit }}"
