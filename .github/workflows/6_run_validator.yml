name: 6 DeepWiki Proof Gate

on:
  workflow_dispatch:
    inputs:
      smoke_limit:
        description: "Optional small-run limit for smoke testing"
        required: false
        default: ""
      chain_next:
        description: "Verify output and dispatch the next workflow"
        required: false
        default: "false"
#  push:
#    branches:
#      - master


permissions:
  contents: write
  actions: write

jobs:
  run-deepwiki:
    runs-on: ubuntu-latest
    env:
      BOT_SMOKE_LIMIT: ${{ inputs.smoke_limit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
          pip install -r requirements.txt || echo "No requirements.txt found, skipping"

      - name: Check for proof-gate candidate files
        id: check_audited
        run: |
          if [ -n "$(find needs_local_proof deepwiki_candidates -type f \( -name '*.md' -o -name '*.json' \) 2>/dev/null | head -n 1)" ]; then
            echo "run_workflow=true" >> $GITHUB_OUTPUT
          else
            echo "run_workflow=false" >> $GITHUB_OUTPUT
          fi

      - name: Build proof-gate pending queue
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

        if: steps.check_audited.outputs.run_workflow == 'true'
        run: python run_generate_proof_gate_pending.py

      - name: Commit and push changes
        if: steps.check_audited.outputs.run_workflow == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          git commit -m "Auto-update: collections and reports"
          # Retry logic
          n=0
          until [ $n -ge 3 ]; do
            git pull --rebase origin master
            if git push --force origin master; then
              echo "Push succeeded"
              break
            fi
            n=$((n+1))
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          
          # Fail the step if all retries are exhausted
          if [ $n -eq 3 ]; then
          echo "Failed to push after 3 attempts"
          exit 1
          fi


      - name: Trigger next proof-gate batch
        if: steps.check_audited.outputs.run_workflow == 'true' && inputs.smoke_limit == '' && inputs.chain_next != 'true'
        uses: nick-fields/retry@v3
        with:
          max_attempts: 5
          timeout_seconds: 60
          retry_on: 'error'
          retry_wait_seconds: 300  # 5 minutes between retries
          command: |
            #!/bin/bash
            set -e
            # Using curl directly with the GitHub API
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/6_run_validator.yml/dispatches \
              -d '{"ref":"master"}'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Run DeepWiki proof gate
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

        if: steps.check_audited.outputs.run_workflow == 'true'
        run: python run_proof_gate.py


      - name: Commit and push changes
        if: steps.check_audited.outputs.run_workflow == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          git commit -m "Auto-update: collections and reports"
          # Retry logic
          n=0
          until [ $n -ge 3 ]; do
            git pull --rebase origin master
            if git push --force origin master; then
              echo "Push succeeded"
              break
            fi
            n=$((n+1))
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          
          # Fail the step if all retries are exhausted
          if [ $n -eq 3 ]; then
          echo "Failed to push after 3 attempts"
          exit 1
          fi

      - name: Verify and advance chain
        if: steps.check_audited.outputs.run_workflow == 'true' && inputs.chain_next == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python workflow_chain.py advance --stage 6 --same-workflow 6_run_validator.yml --next-workflow 8_run_validator_report.yml --smoke-limit "${{ inputs.smoke_limit }}"
