name: 0.1 Collect Live Pool Token Context

on:
  workflow_dispatch:
    inputs:
      smoke_limit:
        description: "Optional small-run limit for smoke testing"
        required: false
        default: ""
      chain_next:
        description: "Verify output and dispatch the next workflow"
        required: false
        default: "false"

permissions:
  contents: write
  actions: write

jobs:
  collect-live-context:
    runs-on: ubuntu-latest
    env:
      BOT_SMOKE_LIMIT: ${{ inputs.smoke_limit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found, skipping"

      - name: Collect live context
        run: python run_pool_token_stage.py collect-live-context

      - name: Commit artifacts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f setup/live_context.json targets/
          git commit -m "Auto-update: collect live pool token context" || echo "No changes to commit"
          git pull --rebase origin master
          git push origin master

      - name: Verify and advance chain
        if: inputs.chain_next == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python workflow_chain.py advance --stage 0.1 --next-workflow 0.2_match_pool_token_primitives.yml --smoke-limit "${{ inputs.smoke_limit }}"
