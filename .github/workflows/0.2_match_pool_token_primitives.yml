# registry-refresh: 2026-07-02
name: 0.2 Match Pool Token Primitives

on:
  workflow_dispatch:
    inputs:
      smoke_limit:
        description: "Optional small-run limit for smoke testing"
        required: false
        default: ""
      chain_next:
        description: "Verify output and dispatch the next workflow"
        required: false
        default: "false"

permissions:
  contents: write
  actions: write

jobs:
  match-primitives:
    runs-on: ubuntu-latest
    env:
      BOT_SMOKE_LIMIT: ${{ inputs.smoke_limit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Match exploit primitives
        env:
          BOT_BLUEPRINT_PATH: blueprints/live_pool_token_bug_bounty.json
        run: python run_pool_token_stage.py match-primitives

      - name: Commit artifacts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f setup/primitive_matches.json targets/
          git commit -m "hfu3868dbdj48hvhsj" || echo "No changes to commit"
          git pull --rebase origin master
          git push origin master

      - name: Verify and advance chain
        if: inputs.chain_next == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python workflow_chain.py advance --stage 0.2 --next-workflow 0.3_generate_pool_token_probe_manifest.yml --smoke-limit "${{ inputs.smoke_limit }}"
